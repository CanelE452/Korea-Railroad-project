# YOLOv8-pose 학습 설정 (팔레트 9-keypoint)
#
# Keypoint 순서 (v4 camera-facing convention):
#   0: front-top-LEFT   1: front-top-RIGHT
#   2: front-bot-RIGHT  3: front-bot-LEFT
#   4: rear-top-LEFT    5: rear-top-RIGHT
#   6: rear-bot-RIGHT   7: rear-bot-LEFT
#   8: centroid

path: C:/Users/minjae/Documents/github/FoundationPose/challenge/data/yolo_pose
train: images/train
val: images/val

# 클래스
nc: 1
names:
  0: pallet

# Keypoint 정의
kpt_shape: [9, 3]             # 9 keypoint, [x, y, visibility]

# 좌우 flip 시 keypoint index swap
#   0↔1 (front-top L↔R), 3↔2 (front-bot L↔R)
#   4↔5 (rear-top  L↔R), 7↔6 (rear-bot  L↔R)
#   8↔8 (centroid)
flip_idx: [1, 0, 3, 2, 5, 4, 7, 6, 8]
