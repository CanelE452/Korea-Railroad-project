# =============================================================================
# Challenge — BASELINE LOOSE 재현용 (gate 거의 없이)
# =============================================================================
# 사용자가 본 "매 프레임 false positive" 동작을 그대로 재현하기 위한 설정.
# 실제 운영용은 task.yaml.

baseline:
  weights: challenge/weights/baseline_v8_A.pth
  source_run: weights/v8_A_control
  train_args_header: challenge/weights/baseline_v8_A.header.txt

model:
  architecture: dope
  num_keypoints: 9
  num_belief_maps: 9
  num_affinity_fields: 16
  input_size: 448

pallet:
  width: 1.1
  depth: 1.3
  height: 0.11
  keypoint_convention: "y_up"

camera:
  fx: 614.18
  fy: 614.31
  cx: 329.28
  cy: 234.53
  width: 640
  height: 480

# LOOSE — baseline 원래 동작 재현 (대부분 통과)
inference:
  belief:
    threshold: 0.10
    thresh_map: 0.05
    thresh_points: 0.05
    thresh_angle: 0.50
    sigma: 3
  gates:
    min_detected_keypoints: 1         # 사실상 비활성
    max_reproj_error_px: 9999.0       # 비활성
    cuboid_edge_ratio_tol: 10.0       # 비활성
    depth_pnp_z_max_rel: 999.0        # 비활성
    z_min_m: 0.05
    z_max_m: 500.0                    # 23m, 120m 다 통과
  temporal:
    confirm_frames: 1                 # 즉시 confirmed
    track_iou_min: 0.0

finetune:
  from: challenge/weights/baseline_v8_A.pth
  output_dir: challenge/weights/finetuned
  data_train: challenge/data/train
  data_val: challenge/data/val
  epochs: 10
  batch_size: 4
  learning_rate: 1.0e-5
  sigma: 4.0
  struct_coord: 0.003
  struct_delta: 0.03

robot:
  fork:
    left_entry:  [-0.20, 0.05, 0.55]
    right_entry: [+0.20, 0.05, 0.55]
    approach_offset_m: 0.60
    insertion_depth_m: 0.50
