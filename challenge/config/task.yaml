# =============================================================================
# Challenge — Forklift Pallet Insertion Task
# =============================================================================
# 본 config는 main 연구의 default.yaml과 분리되어, 과제용으로 overtune된 설정만 담는다.
# 변경 사유는 _docs/history/ 에 누적 기록.

# --- Baseline snapshot ---
baseline:
  weights: challenge/weights/baseline_v8_A.pth      # v8_A_control/final_net_epoch_0068.pth 스냅샷
  source_run: weights/v8_A_control                  # 원본 학습 디렉토리
  train_args_header: challenge/weights/baseline_v8_A.header.txt
  # 학습 메타 (header.txt 요약):
  #   from:        weights/v9_ablation_A_coord/final_net_epoch_0065.pth
  #   data:        data/pallet/training_data/mixed_v8_train
  #   sigma:       4.0
  #   struct:      coord=0.003, delta=0.03 (flip/edge=0)
  #   lr/bs/epoch: 1e-05 / 4 / 68
  #   seed:        7963

# --- Model ---
model:
  architecture: dope
  num_keypoints: 9
  num_belief_maps: 9
  num_affinity_fields: 16
  input_size: 448

# --- Pallet Spec (실측 110×130×11cm) ---
pallet:
  width: 1.1       # 앞면 폭 (포크 진입면, 짧은 면)
  depth: 1.3       # 깊이 (긴 면)
  height: 0.11     # 두께
  keypoint_convention: "y_up"

# --- Camera (RealSense D435i, calibration from header.txt) ---
camera:
  fx: 614.18
  fy: 614.31
  cx: 329.28
  cy: 234.53
  width: 640
  height: 480

# --- Live inference (overtune for low false positive) ---
# 기본 run_dope_live의 threshold가 너무 낮아 매 프레임 잘못된 detection 발생.
# 본 과제에서는 false positive 최소화 우선 → threshold 상향 + sanity check 추가.
inference:
  belief:
    threshold: 0.30           # peak가 valid keypoint로 간주되는 최소값 (기존 0.10)
    thresh_map: 0.30          # find_object_poses 내부 map threshold (기존 0.05)
    thresh_points: 0.30       # find_object_poses 내부 points threshold (기존 0.05)
    thresh_angle: 0.50
    sigma: 3

  gates:
    # PnP 결과를 detection으로 인정하기 위한 최소 조건
    min_detected_keypoints: 7         # 9개 중 최소 7개 (코너 6 + 중심 1 권장)
    max_reproj_error_px: 8.0          # PnP reprojection error 상한 (px)
    cuboid_edge_ratio_tol: 0.30       # 예상 edge 비율 대비 허용 오차
    depth_pnp_z_max_rel: 0.30         # depth와 PnP z 상대 오차 상한 (30%)
    z_min_m: 0.30                     # 카메라 앞 z 최소값 (m)
    z_max_m: 5.00                     # z 최대값 (m)

  temporal:
    # 시간적 일관성으로 single-frame false positive 추가 억제
    confirm_frames: 2                 # N프레임 연속 통과 시 confirmed
    track_iou_min: 0.30               # 직전 프레임 detection과 keypoint IoU 비슷도

# --- Finetune (challenge data로 추가 학습) ---
# 별도 데이터셋 수집 후 채워 넣음
finetune:
  from: challenge/weights/baseline_v8_A.pth
  output_dir: challenge/weights/finetuned
  data_train: challenge/data/train
  data_val: challenge/data/val
  epochs: 10
  batch_size: 4
  learning_rate: 1.0e-5
  sigma: 4.0
  struct_coord: 0.003
  struct_delta: 0.03

# --- Robot / Fork insertion ---
# 6D pose → forklift entry pose
robot:
  fork:
    # 팔레트 정면 두 포크 구멍 중심 (팔레트 로컬 좌표, meters, Y=UP)
    # KS T-11 양면형: 포크 구멍 중심 간격 ~0.4m, 바닥에서 ~0.05m
    left_entry:  [-0.20, 0.05, 0.55]   # +Z = pallet front
    right_entry: [+0.20, 0.05, 0.55]
    approach_offset_m: 0.60            # 진입 전 정지 위치 (pallet front 기준)
    insertion_depth_m: 0.50            # 포크 삽입 깊이
