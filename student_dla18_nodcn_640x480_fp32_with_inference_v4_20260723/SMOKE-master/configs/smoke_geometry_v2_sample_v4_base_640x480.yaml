MODEL:
  WEIGHT: ""
  SMOKE_HEAD:
    MODE: "geometry_v2"
    REGRESSION_HEADS: 4
    REGRESSION_CHANNEL: (1, 1, 2)
    DIMENSION_REFERENCE: ((5.16, 1.97, 1.74),)
    DEPTH_REFERENCE: (6.79, 2.32)
    REGRESSION_LOSS: "L1"
INPUT:
  WIDTH_TRAIN: 640
  HEIGHT_TRAIN: 480
  WIDTH_TEST: 640
  HEIGHT_TEST: 480
  FLIP_PROB_TRAIN: 0.5
  SHIFT_SCALE_PROB_TRAIN: 0.3
DATASETS:
  DETECT_CLASSES: ("Car",)
  TRAIN: ("kitti_train",)
  TEST: ("kitti_test",)
  TRAIN_SPLIT: "train"
  TEST_SPLIT: "val"
SOLVER:
  OPTIMIZER: "Adam"
  BASE_LR: 2.5e-4
  WEIGHT_DECAY: 0.0
  STEPS: (6250, 10000)
  MAX_ITERATION: 15000
  CHECKPOINT_PERIOD: 1000
  IMS_PER_BATCH: 16
  RESUME: False
  LOAD_OPTIMIZER_SCHEDULER: False
  USE_EMA: False
