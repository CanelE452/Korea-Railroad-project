services:
  pallet-recognition:
    build:
      context: .
      dockerfile: docker/realsense_pallet.Dockerfile
    image: pallet_recognition:latest
    container_name: pallet_live
    privileged: true
    network_mode: "host"
    environment:
      - DISPLAY=host.docker.internal:0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_X11_NO_MITSHM=1
    volumes:
      - .:/workspace
      - /dev/bus/usb:/dev/bus/usb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    command: python3 run_dope_live.py --realsense
